<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <span class="navbar-brand fs-4 fw-bold">🛒 ShopCart</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container my-4">
        <h1 class="display-5 mb-4">Shopping Cart</h1>
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="list-group list-group-flush">
                            <div class="list-group-item d-flex gap-3 py-3">
                                <div class="bg-light rounded d-flex align-items-center justify-content-center flex-shrink-0"
                                    style="width: 100px; height: 100px; font-size: 2rem;">📱</div>
                                <div class="flex-grow-1">
                                    <h5 class="mb-1">Smartphone</h5>
                                    <p class="text-muted mb-2">₹58,000</p>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="text-muted small">Quantity:</span>
                                        <div class="btn-group btn-group-sm">
                                            <button class="btn btn-outline-secondary">-</button>
                                            <button class="btn btn-outline-secondary disabled">1</button>
                                            <button class="btn btn-outline-secondary">+</button>
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-danger btn-sm align-self-start">Remove</button>
                            </div>
                            <div class="list-group-item d-flex gap-3 py-3">
                                <div class="bg-light rounded d-flex align-items-center justify-content-center flex-shrink-0"
                                    style="width: 100px; height: 100px; font-size: 2rem;">🎧</div>
                                <div class="flex-grow-1">
                                    <h5 class="mb-1">Headphones</h5>
                                    <p class="text-muted mb-2">₹24,900</p>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="text-muted small">Quantity:</span>
                                        <div class="btn-group btn-group-sm">
                                            <button class="btn btn-outline-secondary">-</button>
                                            <button class="btn btn-outline-secondary disabled">2</button>
                                            <button class="btn btn-outline-secondary">+</button>
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-danger btn-sm align-self-start">Remove</button>
                            </div>
                            <div class="list-group-item d-flex gap-3 py-3">
                                <div class="bg-light rounded d-flex align-items-center justify-content-center flex-shrink-0"
                                    style="width: 100px; height: 100px; font-size: 2rem;">🖱️</div>
                                <div class="flex-grow-1">
                                    <h5 class="mb-1">Wireless Mouse</h5>
                                    <p class="text-muted mb-2">₹4,100</p>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="text-muted small">Quantity:</span>
                                        <div class="btn-group btn-group-sm">
                                            <button class="btn btn-outline-secondary">-</button>
                                            <button class="btn btn-outline-secondary disabled">1</button>
                                            <button class="btn btn-outline-secondary">+</button>
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-danger btn-sm align-self-start">Remove</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Order Summary</h4>
                        <div class="d-flex justify-content-between mb-3 pb-3 border-bottom">
                            <span>Subtotal:</span>
                            <span>₹1,12,000</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 pb-3 border-bottom">
                            <span>Shipping:</span>
                            <span>₹1,250</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 pb-3 border-bottom">
                            <span>Tax:</span>
                            <span>₹9,000</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4 pb-3 border-top border-2 pt-3 fs-5 fw-bold">
                            <span>Total:</span>
                            <span>₹1,22,250</span>
                        </div>
                        <button class="btn btn-success w-100 py-2">Proceed to Checkout</button>
                    </div>
                </div>
            </div>
        </div>
        </main>
        <!-- Bootstrap 5 JS Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
